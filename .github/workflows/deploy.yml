name: 🚀 Deploy HS Code Verifier with Auth

on:
  push:
    branches: [ feature/auth-system, main ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Wymuś ponowny deploy'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'
  WORKER_NAME: 'hs-code-verifier-api-auth'
  WORKER_URL: 'https://hs-code-verifier-api-auth.workers.dev'
  KV_ID: 'd4e909bdc6114613ab76635fadb855b2'

jobs:
  setup:
    runs-on: ubuntu-latest
    name: ⚙️ Setup and Install
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        run: |
          npm install
          cd backend
          npm install

  deploy-backend:
    runs-on: ubuntu-latest
    name: ⚡ Deploy Backend Worker
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm install

      - name: 🚀 Deploy Worker with Environment Variables
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: 'backend'
          # Wrangler automatycznie użyje accountId z parametru powyżej
          # NIE musimy go wpisywać w wrangler.toml

      - name: 📝 Log deployment info
        run: |
          echo "✅ Worker został wdrożony!"
          echo "🌐 URL: ${{ env.WORKER_URL }}"
          echo "🗄️  KV Namespace ID: ${{ env.KV_ID }}"
          echo "👤 Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo ""
          echo "ℹ️  Następne kroki:"
          echo "1. Dodaj JWT_SECRET, SYNC_TOKEN i CRON_SECRET w Cloudflare Dashboard"
          echo "2. Uruchom synchronizację: npm run delta-sync"
          echo "3. Sprawdź: curl ${{ env.WORKER_URL }}/health"

  verify-deployment:
    runs-on: ubuntu-latest
    name: ✅ Verify Deployment
    needs: deploy-backend
    
    steps:
      - name: 🩺 Health check
        run: |
          echo "Sprawdzam zdrowie API..."
          sleep 10
          curl -s ${{ env.WORKER_URL }}/health | jq . || curl -s ${{ env.WORKER_URL }}/health
          
      - name: 📊 Deployment summary
        run: |
          echo "🎉 DEPLOYMENT ZAKOŃCZONY!"
          echo ""
          echo "📋 LINKI:"
          echo "• Backend API: ${{ env.WORKER_URL }}"
          echo "• Frontend: https://hs-code-auth.pages.dev (skonfiguruj ręcznie w Cloudflare Pages)"
          echo "• KV Namespace ID: ${{ env.KV_ID }}"
          echo "• Cloudflare Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo ""
          echo "🔧 NASTĘPNE KROKI:"
          echo "1. Dodaj JWT_SECRET, SYNC_TOKEN i CRON_SECRET w Cloudflare Dashboard"
          echo "2. Uruchom: npm run delta-sync"
          echo "3. Dodaj pierwszego użytkownika: npm run add-user <username> <password> <role>"
          echo "4. Testuj: curl -X POST ${{ env.WORKER_URL }}/verify -H 'Content-Type: application/json' -d '{\"code\":\"0101\"}' -H 'Authorization: Bearer <token>'"