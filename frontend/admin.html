<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Panel Administratora</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eef2f6;
        }
        th {
            background-color: var(--q4r-primary);
            color: white;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f8f9fc;
        }
        .refresh-btn {
            background: var(--q4r-accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: #e06c00;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-left: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .user-info span {
            font-weight: 600;
            color: var(--q4r-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image">
                <h1>PANEL ADMINISTRATORA</h1>
            </div>
            <p class="subtitle">Podgląd logów wyszukiwań kodów HS</p>
        </header>

        <main class="main">
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-shield" style="font-size: 1.8rem; color: var(--q4r-primary);"></i>
                <span id="username"></span>
                <button id="backToAppBtn" class="btn-secondary" style="margin-left: auto;">
                    <i class="fas fa-arrow-left"></i> Powrót do weryfikatora
                </button>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Wyloguj
                </button>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2><i class="fas fa-history"></i> Historia zapytań</h2>
                    <button id="refreshLogsBtn" class="refresh-btn">
                        <i class="fas fa-sync-alt"></i> Odśwież
                    </button>
                </div>
                
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Ładowanie logów...</p>
                </div>

                <div id="logsContainer" class="table-container">
                    <table id="logsTable">
                        <thead>
                            <tr>
                                <th>Data i czas</th>
                                <th>Użytkownik</th>
                                <th>Kod HS</th>
                                <th>Adres IP</th>
                            </tr>
                        </thead>
                        <tbody id="logsBody">
                            <tr><td colspan="4" style="text-align: center;">Brak danych do wyświetlenia</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p><strong>Q4Rail Sp. z o.o.</strong> &copy; 2026 | Panel administratora</p>
        </footer>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
