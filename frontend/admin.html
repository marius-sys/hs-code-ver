<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Panel Administratora</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image">
                <h1>PANEL ADMINISTRATORA</h1>
            </div>
            <div class="user-info">
                Zalogowany jako: <span id="loggedUser"></span>
                <button id="homeBtn" class="btn-home"><i class="fas fa-home"></i> Strona główna</button>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Wyloguj</button>
            </div>
        </header>

        <main class="main">
            <div class="card">
                <h2><i class="fas fa-history"></i> Historia zapytań</h2>
                <div id="logsContainer">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Użytkownik</th>
                                <th>Kod HS</th>
                                <th>IP</th>
                            </tr>
                        </thead>
                        <tbody id="logsBody">
                            <tr><td colspan="4">Ładowanie...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
