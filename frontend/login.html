<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Logowanie do systemu HS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <header class="header">
            <div class="logo">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image">
                <h1>HS CODE VERIFIER</h1>
            </div>
            <p class="subtitle">Logowanie do systemu weryfikacji</p>
        </header>

        <main class="main">
            <div class="card">
                <h2><i class="fas fa-lock"></i> Zaloguj się</h2>
                <div id="login-error" class="error-message hidden"></div>
                <div class="input-group" style="flex-direction: column;">
                    <input type="text" id="username" placeholder="Nazwa użytkownika" style="margin-bottom: 10px;">
                    <input type="password" id="password" placeholder="Hasło">
                </div>
                <button id="loginBtn" class="btn-primary" style="width: 100%; justify-content: center;">
                    <i class="fas fa-sign-in-alt"></i> Zaloguj
                </button>
            </div>

            <div class="info-card" style="margin-top: 20px; text-align: left;">
                <i class="fas fa-info-circle"></i>
                <h3>Dane dostępowe</h3>
                <p>Login i hasło otrzymasz od administratora.</p>
            </div>
        </main>

        <footer class="footer">
            <p><strong>Q4Rail Sp. z o.o.</strong> &copy; 2026 | System autoryzacji v1.0</p>
        </footer>
    </div>

    <script>
        (function() {
            const loginBtn = document.getElementById('loginBtn');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const errorDiv = document.getElementById('login-error');

            loginBtn.addEventListener('click', async () => {
                const user = username.value.trim();
                const pass = password.value.trim();
                if (!user || !pass) {
                    showError('Wprowadź nazwę użytkownika i hasło');
                    return;
                }

                try {
                    const response = await fetch('https://hs-code-verifier-api.konto-dla-m-w-q4r.workers.dev/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('hs_token', data.token);
                        localStorage.setItem('hs_user', data.username);
                        localStorage.setItem('hs_role', data.role);
                        window.location.href = '/';
                    } else {
                        showError('Nieprawidłowy login lub hasło');
                    }
                } catch (err) {
                    showError('Błąd połączenia z serwerem');
                }
            });

            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.classList.remove('hidden');
            }
        })();
    </script>
</body>
</html>
