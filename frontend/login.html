<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Logowanie</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(21, 42, 94, 0.12);
        }
        .login-container h2 {
            color: var(--q4r-primary);
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--q4r-dark);
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--q4r-primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(21, 42, 94, 0.15);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--q4r-accent) 0%, #ff8c29 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(255, 124, 0, 0.3);
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #e06c00 0%, #ff7c00 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 124, 0, 0.4);
        }
        .error-message {
            color: #dc3545;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="login-container">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image" style="height: 50px;">
                <h2 style="color: var(--q4r-primary);">HS CODE VERIFIER</h2>
            </div>
            <h2>Logowanie</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Nazwa użytkownika</label>
                    <input type="text" id="username" name="username" placeholder="Wprowadź nazwę" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Hasło</label>
                    <input type="password" id="password" name="password" placeholder="Wprowadź hasło" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Zaloguj się
                </button>
            </form>
            <div id="errorMsg" class="error-message"></div>
            <div class="info-text">
                <i class="fas fa-info-circle"></i> Wprowadź dane otrzymane od administratora.
            </div>
        </div>
    </div>

    <script>
        const apiBaseUrl = 'https://hs-code-verifier-api.konto-dla-m-w-q4r.workers.dev';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorMsg.textContent = 'Wprowadź nazwę użytkownika i hasło.';
                return;
            }

            errorMsg.textContent = '';
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logowanie...';

            try {
                const response = await fetch(`${apiBaseUrl}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || 'Błąd logowania');
                }

                const data = await response.json();
                // Zapisz token i dane użytkownika w localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);

                // Przekieruj do strony głównej
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Błąd logowania:', error);
                errorMsg.textContent = 'Nieprawidłowa nazwa użytkownika lub hasło.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Zaloguj się';
            }
        });
    </script>
</body>
</html>
