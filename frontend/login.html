<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Logowanie</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image">
                <h1>HS CODE VERIFIER</h1>
            </div>
        </header>
        <main class="main">
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h2 style="text-align: center;">Zaloguj się do systemu</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Nazwa użytkownika" required autocomplete="username">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Hasło" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">
                        <i class="fas fa-sign-in-alt"></i> Zaloguj
                    </button>
                </form>
                <div id="loginError" class="error-message hidden"></div>
            </div>
        </main>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
