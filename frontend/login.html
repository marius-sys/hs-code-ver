<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Rail - Logowanie do systemu HS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Dodatkowe style specyficzne dla strony logowania */
        .login-card {
            max-width: 450px;
            margin: 2rem auto;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-weight: 600;
            color: var(--q4r-primary);
        }
        .form-group input {
            padding: 15px 18px;
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: var(--q4r-primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(21, 42, 94, 0.15);
        }
        .login-btn {
            background: linear-gradient(135deg, var(--q4r-accent) 0%, #ff8c29 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(255, 124, 0, 0.3);
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #e06c00 0%, #ff7c00 100%);
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(255, 124, 0, 0.4);
        }
        .login-btn:active {
            transform: translateY(-1px);
        }
        .login-footer {
            text-align: center;
            margin-top: 1rem;
            color: #666;
            font-size: 0.9rem;
        }
        .error-message {
            background: #ffebee;
            color: #dc3545;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="logo.svg" alt="Q4Rail Logo" class="logo-image">
                <h1>HS CODE VERIFIER</h1>
            </div>
            <p class="subtitle">Logowanie do systemu weryfikacji kodów celnych</p>
        </header>

        <main class="main">
            <div class="card login-card">
                <h2><i class="fas fa-lock"></i> Zaloguj się</h2>
                
                <div id="errorMessage" class="error-message hidden">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <div class="login-form">
                    <div class="form-group">
                        <label for="username">Nazwa użytkownika</label>
                        <input type="text" id="username" placeholder="Wprowadź nazwę" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Hasło</label>
                        <input type="password" id="password" placeholder="Wprowadź hasło" autocomplete="current-password">
                    </div>
                    <button id="loginBtn" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Zaloguj
                    </button>
                </div>
                <div class="login-footer">
                    <p>System weryfikacji kodów HS dla Q4Rail Sp. z o.o.</p>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p><strong>Q4Rail Sp. z o.o.</strong> &copy; 2026 | Weryfikator Kodów HS v1.4.3</p>
        </footer>
    </div>

    <script>
        // Obsługa logowania
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            if (!username || !password) {
                showError('Wprowadź nazwę użytkownika i hasło');
                return;
            }

            try {
                const response = await fetch('https://hs-code-verifier-api.konto-dla-m-w-q4r.workers.dev/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        showError('Nieprawidłowa nazwa użytkownika lub hasło');
                    } else {
                        showError('Błąd serwera. Spróbuj później.');
                    }
                    return;
                }

                const data = await response.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);
                window.location.href = 'index.html';
            } catch (error) {
                showError('Błąd połączenia z serwerem');
                console.error(error);
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        // Obsługa klawisza Enter
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
