name = "hs-code-verifier-api-auth"
compatibility_date = "2024-01-01"
main = "src/index.js"
compatibility_flags = [ "nodejs_compat" ]

account_id = ""  # AUTOMATYCZNIE Z GITHUB SECRETS
workers_dev = true

[vars]
ENVIRONMENT = "production"
VERSION = "1.5.0"
MAX_REQUESTS_PER_DAY = 20000
ALLOWED_ORIGINS = "https://hs-code-ver.pages.dev"  # docelowy URL Cloudflare Pages

[[kv_namespaces]]
binding = "HS_DATABASE"
id = "d4e909bdc6114613ab76635fadb855b2"  # istniejące KV – to samo

[triggers]
crons = ["0 3 * * *"]